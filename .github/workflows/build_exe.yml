name: Build SchoolBell.exe

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install PySide6==6.6.1 PyInstaller==6.3.0
          pip install simpleaudio==1.0.4 || echo "simpleaudio optional, skipping"

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name SchoolBellScheduler `
            --add-data "assets;assets" `
            --add-data "locales;locales" `
            --icon "assets/icon.ico" `
            --hidden-import "PySide6.QtMultimedia" `
            --hidden-import "PySide6.QtWidgets" `
            --hidden-import "PySide6.QtCore" `
            --hidden-import "PySide6.QtGui" `
            --hidden-import "json" `
            --hidden-import "sqlite3" `
            --hidden-import "logging" `
            --hidden-import "traceback" `
            --hidden-import "ctypes" `
            app/main.py

      - name: Verify EXE exists
        run: |
          if (Test-Path "dist\SchoolBellScheduler.exe") {
            $size = (Get-Item "dist\SchoolBellScheduler.exe").Length / 1MB
            Write-Host "Build successful! EXE size: $([math]::Round($size, 1)) MB"
          } else {
            Write-Host "ERROR: EXE not found!"
            exit 1
          }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: SchoolBellScheduler
          path: dist/SchoolBellScheduler.exe
          retention-days: 90
